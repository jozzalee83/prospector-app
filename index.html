<!DOCTYPE html>
<html>
<head>
    <title>Prospector AI - HUD</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <div style="position: fixed; top: 10px; left: 10px; z-index: 10; color: #00ff00; font-family: monospace; background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid #00ff00;">
        STATUS: SCANNING...<br>
        LOCATION: SHEPPARTON NORTH, VIC<br>
        <span style="color: gold;">INDICATOR: QUARTZ VEIN DETECTED? [SEARCHING]</span>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-box position="0 0.5 -5" material="opacity: 0.5; color: #ffff00;" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>
        
        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
