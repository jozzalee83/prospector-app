<!DOCTYPE html>
<html>
<head>
    <title>Prospector AI - Scanner</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .scan-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; border-radius: 50%; border: 4px solid gold;
            background: rgba(255, 215, 0, 0.3); color: white; font-weight: bold;
            z-index: 100; cursor: pointer;
        }
        #result-popup {
            position: fixed; top: 150px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #00ff00; padding: 15px;
            border: 1px solid #00ff00; font-family: monospace; display: none; z-index: 101;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <div id="hud" style="position: fixed; top: 10px; left: 10px; z-index: 10; color: #00ff00; font-family: monospace; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #00ff00;">
        SYSTEM: ACTIVE <br>
        LOC: SHEPPARTON NORTH <br>
        SENSOR: MULTISPECTRAL
    </div>

    <div id="result-popup">ANALYZING...</div>

    <button class="scan-btn" onclick="scanSurroundings()">SCAN</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-ring color="gold" radius-inner="0.4" radius-outer="0.5" position="0 0 -3" rotation="-90 0 0"
                animation="property: scale; to: 2 2 2; dur: 2000; loop: true; dir: alternate"></a-ring>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        function scanSurroundings() {
            const popup = document.getElementById('result-popup');
            popup.style.display = 'block';
            popup.innerText = "SENSING INDICATORS...";

            // This simulates the AI "Scanning" the surroundings
            setTimeout(() => {
                const indicators = [
                    "IRON OXIDE DETECTED - HIGH PROBABILITY",
                    "QUARTZ FLOAT IDENTIFIED - CHECK UPSTREAM",
                    "VEGETATION STRESS: MINERALIZED SOIL LIKELY",
                    "SATELLITE STONE: CALCHOPYRITE TRACE"
                ];
                const randomMatch = indicators[Math.floor(Math.random() * indicators.length)];
                popup.innerHTML = `<span style="color: gold;">RESULT:</span><br>${randomMatch}`;
                
                // Hide after 5 seconds
                setTimeout(() => { popup.style.display = 'none'; }, 5000);
            }, 2000);
        }
    </script>
</body>
</html>
