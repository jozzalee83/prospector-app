<!DOCTYPE html>
<html>
<head>
    <title>Prospector AI - Master Toolbox</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .scan-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90px; height: 90px; border-radius: 50%; border: 5px solid #00ff00;
            background: rgba(0, 255, 0, 0.2); color: #00ff00; font-weight: bold;
            z-index: 100; font-family: monospace; font-size: 16px; transition: 0.3s;
        }
        .hub-btn {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            background: rgba(0,0,0,0.8); color: gold; border: 2px solid gold;
            padding: 10px; font-family: monospace; border-radius: 5px; cursor: pointer;
        }
        #analysis-window {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(0,20,0,0.9); color: #00ff00; padding: 15px;
            border: 2px solid #00ff00; font-family: monospace; width: 75%;
            display: none; z-index: 101; text-align: center;
        }
        #hub-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            font-family: monospace;
        }
        .menu-link {
            background: #111; color: white; border: 1px solid #00ff00;
            padding: 15px 30px; margin: 10px; width: 70%; text-align: center;
            text-decoration: none; font-size: 18px; border-radius: 5px; cursor: pointer;
        }
        .close-btn {
            margin-top: 30px; background: red; color: white; border: none;
            padding: 10px 20px; font-family: monospace; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <div id="hud" style="position: fixed; top: 10px; left: 10px; z-index: 10; color: #00ff00; font-family: monospace; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #00ff00;">
        [ SENSOR: ACTIVE ] <br>
        [ MODE: MINERAL SCAN ]
    </div>

    <button class="hub-btn" onclick="openHub()">⚙️ TOOLBOX HUB</button>

    <div id="hub-menu">
        <h2 style="color: gold;">⚒️ PROSPECTOR TOOLBOX</h2>
        <a href="#" class="menu-link" onclick="closeHub()">🔍 AI Mineral Scanner (Active)</a>
        <a href="#" class="menu-link" onclick="alert('Geological Map interface coming soon!')">🗺️ Live Geo-Map</a>
        <a href="#" class="menu-link" onclick="alert('Target logging system coming soon!')">📍 Target Waypoints</a>
        <a href="#" class="menu-link" onclick="alert('Claim status checker coming soon!')">📜 Land & Claim Status</a>
        <button class="close-btn" onclick="closeHub()">CLOSE HUB</button>
    </div>

    <div id="analysis-window">
        <span id="title" style="color:gold; font-weight:bold;">SCANNING SPECTRUM...</span><br>
        <span id="result" style="margin-top: 5px; display: block;">---</span>
    </div>

    <button id="main-scan-btn" class="scan-btn" onclick="startScan()">SCAN</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-ring color="#00ff00" radius-inner="0.1" radius-outer="0.15" position="0 0 -1" rotation="0 0 0"></a-ring>
        <a-entity camera></a-entity>
    </a-scene>

    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
        // --- HUB LOGIC ---
        function openHub() { document.getElementById('hub-menu').style.display = 'flex'; }
        function closeHub() { document.getElementById('hub-menu').style.display = 'none'; }

        // --- SCANNER LOGIC WITH SAFETY LATCH ---
        let isScanning = false;

        function startScan() {
            if (isScanning) return; 
            isScanning = true;
            
            const win = document.getElementById('analysis-window');
            const res = document.getElementById('result');
            const btn = document.getElementById('main-scan-btn');
            
            btn.style.opacity = '0.3'; 
            win.style.display = 'block';
            res.innerText = "CAPTURING LIGHT SIGNATURE...";

            const video = document.querySelector('video');
            const canvas = document.getElementById('hidden-canvas');
            
            if (!video || video.readyState !== 4) {
                res.innerHTML = "<span style='color:red;'>CAMERA FEED LOST</span><br>RE-ESTABLISHING...";
                setTimeout(resetScanner, 2000);
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d', { willReadFrequently: true }); 
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            setTimeout(() => {
                const pixelData = ctx.getImageData(canvas.width/2, canvas.height/2, 1, 1).data;
                const r = pixelData[0], g = pixelData[1], b = pixelData[2];
                const brightness = (r + g + b) / 3;

                if (brightness < 40) {
                    res.innerHTML = "AREA TOO DARK<br><span style='color:grey;'>USE FLASHLIGHT OR REPOSITION</span>";
                } else if (r > 150 && g > 120 && b < 100) {
                    res.innerHTML = "SIGNATURE: <span style='color:gold;'>NATIVE GOLD / SULPHIDES</span><br>POTENTIAL: <span style='color:red; font-weight:bold;'>EXTREME</span>";
                } else if (r > 120 && g < 90 && b < 90) {
                    res.innerHTML = "SIGNATURE: <span style='color:orange;'>IRONSTONE / GOSSAN</span><br>POTENTIAL: <span style='color:orange;'>HIGH INDICATOR</span>";
                } else if (r > 200 && g > 200 && b > 200) {
                    res.innerHTML = "SIGNATURE: <span style='color:white;'>QUARTZ VEIN</span><br>POTENTIAL: <span style='color:yellow;'>MEDIUM INDICATOR</span>";
                } else if (g > r && g > 100 && b < 100) {
                    res.innerHTML = "SIGNATURE: <span style='color:#00ff00;'>GREENSTONE / COPPER TRACE</span><br>POTENTIAL: MEDIUM";
                } else {
                    res.innerHTML = `BASE ROCK DETECTED<br><span style='font-size:12px; color:grey;'>Raw RGB Data: R${r} G${g} B${b}</span>`;
                }
                
                setTimeout(resetScanner, 4000); 
            }, 1200);

            function resetScanner() {
                win.style.display = 'none';
                btn.style.opacity = '1';
                isScanning = false; 
            }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Offline Engine Active!'))
                .catch(err => console.log('Offline Engine Failed: ', err));
            });
        }
    </script>
</body>
</html>
