<!DOCTYPE html>
<html>
<head>
    <title>Prospector AI - Toolbox Hub</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .scan-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90px; height: 90px; border-radius: 50%; border: 5px solid #00ff00;
            background: rgba(0, 255, 0, 0.2); color: #00ff00; font-weight: bold;
            z-index: 100; font-family: monospace; font-size: 16px;
        }
        .hub-btn {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            background: rgba(0,0,0,0.8); color: gold; border: 2px solid gold;
            padding: 10px; font-family: monospace; border-radius: 5px; cursor: pointer;
        }
        #analysis-window {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(0,20,0,0.9); color: #00ff00; padding: 15px;
            border: 2px solid #00ff00; font-family: monospace; width: 70%;
            display: none; z-index: 101; text-align: center;
        }
        #hub-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            font-family: monospace;
        }
        .menu-link {
            background: #111; color: white; border: 1px solid #00ff00;
            padding: 15px 30px; margin: 10px; width: 70%; text-align: center;
            text-decoration: none; font-size: 18px; border-radius: 5px;
        }
        .close-btn {
            margin-top: 30px; background: red; color: white; border: none;
            padding: 10px 20px; font-family: monospace; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <div id="hud" style="position: fixed; top: 10px; left: 10px; z-index: 10; color: #00ff00; font-family: monospace; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #00ff00;">
        [ SENSOR: ACTIVE ] <br>
        [ MODE: MINERAL SCAN ]
    </div>

    <button class="hub-btn" onclick="openHub()">⚙️ TOOLBOX HUB</button>

    <div id="hub-menu">
        <h2 style="color: gold;">⚒️ MASTER TOOLBOX</h2>
        <a href="#" class="menu-link">🔍 Mineral Scanner (Active)</a>
        <a href="https://jozzalee83.github.io/YOUR-MANUAL-REPO-NAME" class="menu-link">📖 Equipment Manuals</a>
        <a href="https://jozzalee83.github.io/YOUR-RC-GAME-REPO-NAME" class="menu-link">🚧 RC Construction Game</a>
        <button class="close-btn" onclick="closeHub()">CLOSE</button>
    </div>

    <div id="analysis-window">
        <span id="title" style="color:gold; font-weight:bold;">SCANNING PIXELS...</span><br>
        <span id="result">---</span>
    </div>

    <button class="scan-btn" onclick="startScan()">SCAN</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-ring color="#00ff00" radius-inner="0.1" radius-outer="0.15" position="0 0 -1" rotation="0 0 0"></a-ring>
        <a-entity camera></a-entity>
    </a-scene>

    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
        // --- HUB LOGIC ---
        function openHub() { document.getElementById('hub-menu').style.display = 'flex'; }
        function closeHub() { document.getElementById('hub-menu').style.display = 'none'; }

        // --- SCANNER LOGIC ---
        function startScan() {
            const win = document.getElementById('analysis-window');
            const res = document.getElementById('result');
            win.style.display = 'block';
            res.innerText = "CAPTURING SPECTRUM...";

            const video = document.querySelector('video');
            const canvas = document.getElementById('hidden-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            setTimeout(() => {
                const pixelData = ctx.getImageData(canvas.width/2, canvas.height/2, 1, 1).data;
                const r = pixelData[0], g = pixelData[1], b = pixelData[2];

                if (r > 100 && g < 100) {
                    res.innerHTML = "IRON OXIDE / GOSSAN<br>POTENTIAL: <span style='color:orange;'>HIGH</span>";
                } else if (r > 180 && g > 180 && b > 180) {
                    res.innerHTML = "QUARTZ / CALCITE<br>POTENTIAL: <span style='color:white;'>MEDIUM</span>";
                } else if (g > r && g > b) {
                    res.innerHTML = "VEGETATION DETECTED<br>ANALYZING PLANT HEALTH...";
                } else {
                    res.innerHTML = "GENERAL MINERAL DEPOSIT<br>CONTINUE PROSPECTING";
                }
                setTimeout(() => { win.style.display = 'none'; }, 4000); 
            }, 1500);
        }
    </script>
</body>
</html>
