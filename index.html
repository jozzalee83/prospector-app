<!DOCTYPE html>
<html>
<head>
    <title>Prospector AI - Master Toolbox</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .scan-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90px; height: 90px; border-radius: 50%; border: 5px solid #00ff00;
            background: rgba(0, 255, 0, 0.2); color: #00ff00; font-weight: bold;
            z-index: 100; font-family: monospace; font-size: 16px; transition: 0.3s;
        }
        .pin-btn {
            position: fixed; bottom: 45px; right: 20px; z-index: 100;
            background: rgba(0,0,0,0.8); color: white; border: 2px solid #00ff00;
            padding: 15px; border-radius: 50%; font-size: 20px; cursor: pointer; transition: 0.3s;
        }
        .hub-btn {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            background: rgba(0,0,0,0.8); color: gold; border: 2px solid gold;
            padding: 10px; font-family: monospace; border-radius: 5px; cursor: pointer;
        }
        #analysis-window {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(0,20,0,0.9); color: #00ff00; padding: 15px;
            border: 2px solid #00ff00; font-family: monospace; width: 75%;
            display: none; z-index: 101; text-align: center;
        }
        #hub-menu, #waypoint-log {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200; display: none;
            flex-direction: column; align-items: center; justify-content: flex-start;
            font-family: monospace; overflow-y: auto; padding-top: 50px;
        }
        .menu-link {
            background: #111; color: white; border: 1px solid #00ff00;
            padding: 15px 30px; margin: 10px; width: 70%; text-align: center;
            text-decoration: none; font-size: 18px; border-radius: 5px; cursor: pointer;
        }
        .close-btn {
            margin-top: 30px; background: red; color: white; border: none;
            padding: 10px 20px; font-family: monospace; border-radius: 5px; cursor: pointer; margin-bottom: 50px;
        }
        .pin-entry {
            background: #222; border-left: 5px solid gold; color: white;
            width: 80%; padding: 10px; margin: 5px 0; text-align: left; font-size: 14px;
        }
        
        /* New Map Styles */
        #map-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 150; display: none;
        }
        #map-container { width: 100%; height: 100%; }
        .map-close-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: red; color: white; border: 2px solid white; padding: 15px 30px;
            font-family: monospace; font-size: 16px; border-radius: 5px; z-index: 400; cursor: pointer;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <div id="hud" style="position: fixed; top: 10px; left: 10px; z-index: 10; color: #00ff00; font-family: monospace; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #00ff00;">
        [ SENSOR: ACTIVE ] <br>
        [ MODE: MINERAL SCAN ]
    </div>

    <button class="hub-btn" onclick="openHub()">⚙️ TOOLBOX HUB</button>
    <button class="pin-btn" onclick="savePin()">📍</button>

    <div id="hub-menu">
        <h2 style="color: gold;">⚒️ PROSPECTOR TOOLBOX</h2>
        <a href="#" class="menu-link" onclick="closeHub()">🔍 AI Mineral Scanner (Active)</a>
        <a href="#" class="menu-link" onclick="openMap()">🗺️ Live Geo-Map</a>
        <a href="#" class="menu-link" onclick="openWaypoints()">📍 Target Waypoints</a>
        <a href="#" class="menu-link" onclick="alert('Claim status checker coming soon!')">📜 Land & Claim Status</a>
        <button class="close-btn" onclick="closeHub()">CLOSE HUB</button>
    </div>

    <div id="waypoint-log">
        <h2 style="color: #00ff00;">📍 SAVED TARGETS</h2>
        <div id="pin-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <button class="close-btn" onclick="clearPins()" style="background: darkorange;">CLEAR LOG</button>
        <button class="close-btn" onclick="closeWaypoints()">BACK TO HUB</button>
    </div>

    <div id="map-view">
        <div id="map-container"></div>
        <button class="map-close-btn" onclick="closeMap()">CLOSE MAP</button>
    </div>

    <div id="analysis-window">
        <span id="title" style="color:gold; font-weight:bold;">SCANNING SPECTRUM...</span><br>
        <span id="result" style="margin-top: 5px; display: block;">---</span>
    </div>

    <button id="main-scan-btn" class="scan-btn" onclick="startScan()">SCAN</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-ring color="#00ff00" radius-inner="0.1" radius-outer="0.15" position="0 0 -1" rotation="0 0 0"></a-ring>
        <a-entity camera></a-entity>
    </a-scene>

    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
        // --- HUB LOGIC ---
        function openHub() { document.getElementById('hub-menu').style.display = 'flex'; }
        function closeHub() { document.getElementById('hub-menu').style.display = 'none'; }

        // --- MAP LOGIC ---
        let geoMap = null;
        let userMarker = null;

        function openMap() {
            closeHub();
            document.getElementById('map-view').style.display = 'block';

            // Build map if it hasn't been built yet
            if (!geoMap) {
                geoMap = L.map('map-container').setView([-36.38, 145.40], 10); 
                
                // Topo map layer
                L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                    maxZoom: 17,
                    attribution: 'Map data: © OpenStreetMap | Style: © OpenTopoMap'
                }).addTo(geoMap);
            }

            // Fix visual glitches from unhiding
            setTimeout(() => { geoMap.invalidateSize(); }, 200);

            // Fetch live location and drop pins
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    geoMap.setView([lat, lon], 14); // Zoom in on your location
                    
                    // Mark current location
                    if (userMarker) geoMap.removeLayer(userMarker);
                    userMarker = L.marker([lat, lon]).addTo(geoMap).bindPopup("<b>You are here</b>").openPopup();
                    
                    // Plot all saved targets
                    let pins = JSON.parse(localStorage.getItem('prospectorPins')) || [];
                    pins.forEach((pin, index) => {
                        L.circleMarker([pin.lat, pin.lon], {
                            color: 'gold', fillColor: '#ffcc00', fillOpacity: 0.8, radius: 8
                        }).addTo(geoMap).bindPopup(`<b>Target #${index + 1}</b><br>${pin.time}`);
                    });
                }, err => {
                    alert("GPS Error. Map needs location access.");
                }, { enableHighAccuracy: true });
            }
        }

        function closeMap() {
            document.getElementById('map-view').style.display = 'none';
        }

        // --- WAYPOINT LOGIC ---
        function savePin() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude.toFixed(5);
                    const lon = position.coords.longitude.toFixed(5);
                    const time = new Date().toLocaleTimeString();
                    const date = new Date().toLocaleDateString();
                    
                    let pins = JSON.parse(localStorage.getItem('prospectorPins')) || [];
                    pins.push({ lat, lon, time, date });
                    localStorage.setItem('prospectorPins', JSON.stringify(pins));
                    
                    const btn = document.querySelector('.pin-btn');
                    btn.style.background = 'gold';
                    btn.style.color = 'black';
                    setTimeout(() => { 
                        btn.style.background = 'rgba(0,0,0,0.8)'; 
                        btn.style.color = 'white';
                    }, 1000);
                }, function(error) {
                    alert("GPS Error: Could not lock location.");
                }, { enableHighAccuracy: true });
            }
        }

        function openWaypoints() {
            closeHub();
            const logWindow = document.getElementById('waypoint-log');
            const pinList = document.getElementById('pin-list');
            logWindow.style.display = 'flex';
            
            let pins = JSON.parse(localStorage.getItem('prospectorPins')) || [];
            pinList.innerHTML = ''; 
            
            if(pins.length === 0) {
                pinList.innerHTML = '<p style="color:white;">No targets pinned yet.</p>';
            } else {
                pins.forEach((pin, index) => {
                    pinList.innerHTML += `
                        <div class="pin-entry">
                            <b>Target #${index + 1}</b><br>
                            Date: ${pin.date} @ ${pin.time}<br>
                            GPS: ${pin.lat}, ${pin.lon}
                        </div>
                    `;
                });
            }
        }

        function closeWaypoints() {
            document.getElementById('waypoint-log').style.display = 'none';
            openHub();
        }

        function clearPins() {
            if(confirm("Delete all saved targets?")) {
                localStorage.removeItem('prospectorPins');
                openWaypoints(); 
            }
        }

        // --- SCANNER LOGIC ---
        let isScanning = false;
        function startScan() {
            if (isScanning) return; 
            isScanning = true;
            
            const win = document.getElementById('analysis-window');
            const res = document.getElementById('result');
            const btn = document.getElementById('main-scan-btn');
            
            btn.style.opacity = '0.3'; 
            win.style.display = 'block';
            res.innerText = "CAPTURING LIGHT SIGNATURE...";

            const video = document.querySelector('video');
            const canvas = document.getElementById('hidden-canvas');
            
            if (!video || video.readyState !== 4) {
                res.innerHTML = "<span style='color:red;'>CAMERA FEED LOST</span><br>RE-ESTABLISHING...";
                setTimeout(resetScanner, 2000);
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d', { willReadFrequently: true }); 
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            setTimeout(() => {
                const pixelData = ctx.getImageData(canvas.width/2, canvas.height/2, 1, 1).data;
                const r = pixelData[0], g = pixelData[1], b = pixelData[2];
                const brightness = (r + g + b) / 3;

                if (brightness < 40) {
                    res.innerHTML = "AREA TOO DARK<br><span style='color:grey;'>USE FLASHLIGHT OR REPOSITION</span>";
                } else if (r > 150 && g > 120 && b < 100) {
                    res.innerHTML = "SIGNATURE: <span style='color:gold;'>NATIVE GOLD / SULPHIDES</span><br>POTENTIAL: <span style='color:red; font-weight:bold;'>EXTREME</span>";
                } else if (r > 120 && g < 90 && b < 90) {
                    res.innerHTML = "SIGNATURE: <span style='color:orange;'>IRONSTONE / GOSSAN</span><br>POTENTIAL: <span style='color:orange;'>HIGH INDICATOR</span>";
                } else if (r > 200 && g > 200 && b > 200) {
                    res.innerHTML = "SIGNATURE: <span style='color:white;'>QUARTZ VEIN</span><br>POTENTIAL: <span style='color:yellow;'>MEDIUM INDICATOR</span>";
                } else if (g > r && g > 100 && b < 100) {
                    res.innerHTML = "SIGNATURE: <span style='color:#00ff00;'>GREENSTONE / COPPER TRACE</span><br>POTENTIAL: MEDIUM";
                } else {
                    res.innerHTML = `BASE ROCK DETECTED<br><span style='font-size:12px; color:grey;'>Raw RGB Data: R${r} G${g} B${b}</span>`;
                }
                
                setTimeout(resetScanner, 4000); 
            }, 1200);

            function resetScanner() {
                win.style.display = 'none';
                btn.style.opacity = '1';
                isScanning = false; 
            }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .catch(err => console.log('Offline Engine Failed: ', err));
            });
        }
    </script>
</body>
</html>
